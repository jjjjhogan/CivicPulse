<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicPulse — Signal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="signal.css">
</head>
<body class="dashboard-body">

  <div class="dash-layout">

    <!-- ── left side panel ───────────────────────────────── -->
    <aside class="sidebar">
      <a class="logo sidebar-logo" href="index.html">CivicPulse</a>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="side-link">
          <span class="side-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M4 13h6V4H4v9Zm0 7h6v-5H4v5Zm10 0h6v-9h-6v9Zm0-16v5h6V4h-6Z"/></svg>
          </span>
          Dashboard
        </a>
        <a href="dashboard.html#feed" class="side-link">
          <span class="side-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M4 5h16v2H4V5Zm0 6h16v2H4v-2Zm0 6h10v2H4v-2Z"/></svg>
          </span>
          Signal feed
        </a>
        <a href="source.html" class="side-link">
          <span class="side-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M11 2.05V13h10.95A11 11 0 1 1 11 2.05Zm2 0A11 11 0 0 1 21.95 11H13V2.05Z"/></svg>
          </span>
          Source analytics
        </a>
      </nav>

      <div class="sidebar-foot">
        <a href="index.html" class="side-link">
          <span class="side-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="m12 3 9 8h-3v9h-4v-6h-4v6H6v-9H3l9-8Z"/></svg>
          </span>
          Back to home
        </a>
      </div>
    </aside>

    <!-- ── main content ──────────────────────────────────── -->
    <main class="dash">

      <section class="dash-section signal-head" id="overview">
        <p class="signal-crumb"><a href="dashboard.html#feed">← Signal feed</a></p>
        <div class="feed-top" id="signalBadges"></div>
        <h1 id="signalTitle">Loading signal…</h1>
        <p class="dash-sub" id="signalMeta"></p>
        <a class="btn signal-open-btn" id="openOriginal" target="_blank" rel="noopener noreferrer" hidden></a>
      </section>

      <section class="dash-section panel" id="fromPanel" hidden>
        <div class="panel-head">
          <h2>Where it's from</h2>
          <span class="panel-hint">The source and outlet behind this signal</span>
        </div>
        <div id="fromBody"></div>
      </section>

      <section class="dash-section panel" id="issuePanel" hidden>
        <div class="panel-head">
          <h2>The issue</h2>
          <span class="panel-hint">What this signal is about</span>
        </div>
        <div id="issueBody"></div>
      </section>

      <section class="dash-section panel" id="locationPanel" hidden>
        <div class="panel-head">
          <h2>Location</h2>
          <span class="panel-hint" id="locationHint"></span>
        </div>
        <div id="signalMap"></div>
      </section>

      <section class="dash-section panel" id="relatedPanel" hidden>
        <div class="panel-head">
          <h2>Related signals</h2>
          <span class="panel-hint" id="relatedHint"></span>
        </div>
        <div class="feed" id="relatedList"></div>
      </section>

    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="signals-data.js"></script>
  <script src="signal.js"></script>
</body>
</html>
